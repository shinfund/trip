<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#378ADD">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22ShinHwa%20Travels%22%2C%22short_name%22%3A%22ShinHwa%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f2faf0%22%2C%22theme_color%22%3A%22%232e7040%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fpng%3Bbase64%2CiVBORw0KGgo%3D%22%2C%22sizes%22%3A%22192x192%22%7D%5D%7D">
<title>ShinHwa Travels · 함께 쌓아가는 이야기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Sunflower:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
button,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input,textarea,select{-webkit-appearance:none;appearance:none}
:root{
  /* ── 주 색상: 코발트 블루 ── */
  --sky:   #378ADD;
  --sky50: #E6F1FB;   /* 연한 배경용 */
  --sky100:#B5D4F4;   /* 테두리·배지 */
  --sky600:#185FA5;   /* 중간 강조 */
  --sky800:#0C447C;   /* 진한 텍스트·버튼 */

  /* ── 보조 색상 ── */
  --teal:   #1D9E75;  --teal50: #E1F5EE;  --teal100:#9FE1CB;
  --teal600:#0F6E56;  --teal800:#085041;
  --coral:  #D85A30;  --coral50:#FAECE7;  --coral100:#F5C4B3;
  --coral800:#712B13;
  --amber:  #BA7517;  --amber50:#FAEEDA;  --amber100:#FAC775;
  --amber800:#633806;
  --green:  #639922;  --green50:#EAF3DE;  --green100:#C0DD97;
  --green800:#27500A;
  --purple: #534AB7;  --purple50:#EEEDFE; --purple100:#CECBF6;
  --purple800:#3C3489;
  --pink:   #993556;  --pink50: #FBEAF0;  --pink100:#F4C0D1;
  --pink800:#72243E;
  --gray50: #F1EFE8;  --gray100:#D3D1C7;  --gray200:#B4B2A9;
  --gray600:#5F5E5A;

  /* ── 배경·카드·텍스트 ── */
  --bg:     #F5F8FF;
  --card:   #FFFFFF;
  --border: #E0EAF5;
  --border2:#EBF3FF;
  --txt:    #1A2535;
  --txt2:   #354A63;
  --txt3:   #526480;

  /* ── 모서리 단계 ── */
  --r6:6px; --r8:8px; --r12:12px; --r14:14px;
  --r16:16px; --r20:20px; --r24:24px;

  /* ── 그림자 (파란빛 — 회색보다 청량함) ── */
  --shadow:       0 2px 12px rgba(55,138,221,.08);
  --shadow-hover: 0 6px 24px rgba(55,138,221,.15);

  /* ── content 좌우 padding (탭바 음수마진 계산용) ── */
  --cp: 20px;

  /* 여행 카드 테마 기본값 */
  --tc-bg:#E6F1FB;--tc-border:#B5D4F4;--tc-txt:#0C447C;--tc-txt2:#185FA5
}
.form-inp,.form-select{
  width:100%;padding:10px 13px;
  border:1.5px solid var(--border);border-radius:var(--r8);
  font-size:17px;font-family:inherit;color:var(--txt);
  background:var(--bg);transition:border-color .15s;min-height:44px
}
.spot-tip-text { color:var(--teal800);font-weight:600;font-size:13px; }



/* ── 사진 첨부 미리보기 ── */
.place-photo { width:100%;height:80px;object-fit:cover;border-radius:var(--r8);margin-top:6px;cursor:pointer;border:1px solid var(--border); }

/* ── 검색바 (일정) ── */

/* ── 일정 복제 버튼 ── */
.tc-btn-clone { background:var(--teal50);border-color:var(--teal100);color:var(--teal800); }
.tc-btn-clone:hover { background:var(--teal100); }

:focus-visible{outline:2px solid var(--sky);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
/* ── 여행 카드 색상 테마 ── */
[data-trip-color="sky"]    { --tc-bg:#E6F1FB;--tc-border:#B5D4F4;--tc-txt:#0C447C;--tc-txt2:#185FA5; }
[data-trip-color="teal"]   { --tc-bg:#E1F5EE;--tc-border:#9FE1CB;--tc-txt:#085041;--tc-txt2:#0F6E56; }
[data-trip-color="coral"]  { --tc-bg:#FAECE7;--tc-border:#F5C4B3;--tc-txt:#712B13;--tc-txt2:#D85A30; }
[data-trip-color="amber"]  { --tc-bg:#FAEEDA;--tc-border:#FAC775;--tc-txt:#633806;--tc-txt2:#BA7517; }
[data-trip-color="purple"] { --tc-bg:#EEEDFE;--tc-border:#CECBF6;--tc-txt:#3C3489;--tc-txt2:#534AB7; }
[data-trip-color="green"]  { --tc-bg:#EAF3DE;--tc-border:#C0DD97;--tc-txt:#27500A;--tc-txt2:#639922; }

/* 여행 테마 공통 CSS 클래스 */
.tc-hero { background:var(--tc-bg);border:1.5px solid var(--tc-border);border-radius:var(--r16);padding:18px;margin-bottom:14px;transition:background .3s,border-color .3s; }
#detailContent { transition:all .3s; }
.tc-title-txt { color:var(--tc-txt);font-size:17px;font-weight:800;margin-bottom:4px; }
.tc-date-txt { color:var(--tc-txt);font-size:14px;font-weight:600;margin-bottom:8px;opacity:.85; }
.tc-memo-txt { color:var(--tc-txt);font-size:14px;line-height:1.6;opacity:.8; }
.tc-tag { background:var(--tc-bg);color:var(--tc-txt);border:1px solid var(--tc-border);font-size:13px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block; }

html,body{height:100%;overflow-x:clip;scrollbar-gutter:stable}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--txt);font-size:15px;
  display:flex;flex-direction:column;min-height:100vh;
  word-break:keep-all;line-height:1.7;
  -webkit-font-smoothing:antialiased
}

/* ── 헤더 ── */
.header{
  background:var(--card);border-bottom:1.5px solid var(--border);
  padding:12px 20px 0;
  padding-top:max(12px,env(safe-area-inset-top));
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(55,138,221,.06)
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{
  width:40px;height:40px;background:#f2faf0;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  border:1.5px solid #c8e8b8;overflow:hidden
}
.logo-name{font-size:20px;font-weight:800;color:#2e7040;letter-spacing:-.5px;font-family:'Sunflower','Noto Sans KR',sans-serif}
.logo-en{font-size:12px;color:#5aa066;font-weight:600;letter-spacing:.5px;margin-top:-2px}

/* 메인 탭바 */
.main-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;margin:0 -20px;padding:0 20px}
.main-tabs::-webkit-scrollbar{display:none}
.mtab{
  flex:1;min-width:52px;padding:10px 8px 11px;
  text-align:center;cursor:pointer;font-size:15px;font-weight:700;
  color:var(--txt2);border-bottom:3px solid transparent;
  transition:all .18s;white-space:nowrap;user-select:none;
  display:inline-flex;align-items:center;justify-content:center
}
.mtab.on{color:var(--sky800);border-bottom-color:var(--sky);font-weight:800}
.mtab:hover:not(.on){color:var(--txt);background:var(--sky50)}

/* ── 메인 콘텐츠 ── */
.content{flex:1;padding:16px 20px max(32px,env(safe-area-inset-bottom));max-width:900px;margin:0 auto;width:100%}
.panel{display:none}
.panel.on{animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 섹션 */
.sec{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}
.sec-t{font-size:17px;font-weight:800;color:var(--txt);letter-spacing:-.4px}
.sec-more{font-size:13px;font-weight:700;color:var(--sky600);cursor:pointer;padding:4px 8px;border-radius:var(--r6);transition:background .15s}
.sec-more:hover{background:var(--sky50)}


/* 퀵 메뉴 */
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.quick-5{grid-template-columns:repeat(5,1fr)}
.q-item{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--r12);
  padding:14px 6px 12px;text-align:center;cursor:pointer;transition:all .18s;
  box-shadow:var(--shadow)
}
.q-item:hover{border-color:var(--sky100);transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.q-ico{font-size:24px;margin-bottom:6px}
.q-lbl{font-size:13px;font-weight:700;color:var(--txt)}

/* 가로 스크롤 */
.hscroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:6px;margin-bottom:16px}
.hscroll::-webkit-scrollbar{display:none}

/* 여행지 카드 */
.dest{
  flex-shrink:0;width:152px;background:var(--card);
  border:1.5px solid var(--border);border-radius:var(--r16);
  overflow:hidden;cursor:pointer;transition:all .2s;
  box-shadow:var(--shadow)
}
.dest:hover{border-color:var(--sky100);transform:translateY(-4px);box-shadow:var(--shadow-hover)}
.dest-img{height:100px;display:flex;align-items:flex-end;padding:8px;position:relative;font-size:36px;align-items:center;justify-content:center}

.dest-body{padding:10px 11px}
.dest-name{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:2px}
.dest-loc{font-size:13px;color:var(--txt2);margin-bottom:5px;font-weight:500}
.dest-price{font-size:14px;font-weight:800;color:var(--sky800)}
.dest-price span{font-size:12px;font-weight:500;color:var(--txt3)}

.theme-card{
  border-radius:var(--r14);padding:16px;cursor:pointer;
  border:1.5px solid transparent;transition:all .18s;
  box-shadow:var(--shadow)
}
.theme-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
.th-ico{font-size:24px;margin-bottom:7px}
.th-name{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:2px}
.th-cnt{font-size:13px;font-weight:600;color:var(--txt2)}




/* 국가 필터 */
.country-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;padding-bottom:2px}
.country-row::-webkit-scrollbar{display:none}

/* 지역 그리드 */
.rgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:18px}
.ritem{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:10px 4px 9px;
  background:var(--card);border:2px solid var(--border);border-radius:var(--r12);
  cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);
  box-shadow:var(--shadow);text-align:center
}
.ritem:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.ritem.on{border-color:var(--sky);background:var(--sky50);border-width:2.5px}
.r-ico{font-size:22px;line-height:1;filter:drop-shadow(0 1px 3px rgba(0,0,0,.1))}
.r-lbl{font-size:13px;font-weight:700;color:var(--txt);line-height:1.3;word-break:keep-all}
.r-cnt{font-size:12px;font-weight:600;color:var(--txt2);margin-top:-1px}


/* ── 강원도 내장 앱 ── */
.gw-app{background:var(--card);border:1.5px solid var(--teal100);border-radius:var(--r20);overflow:hidden;box-shadow:var(--shadow)}
.gw-header{background:var(--teal50);padding:16px 18px;border-bottom:1.5px solid var(--teal100)}
.gw-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gw-logo{display:flex;align-items:center;gap:10px}
.gw-mark{width:40px;height:40px;background:var(--teal100);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;border:1.5px solid rgba(29,158,117,.2)}
.gw-name{font-size:17px;font-weight:800;color:var(--teal800);font-family:'Sunflower','Noto Sans KR',sans-serif}
.gw-sub{font-size:13px;color:var(--teal600);font-weight:600;margin-top:1px}
.gw-add-btn{
  display:flex;align-items:center;gap:5px;
  font-size:13px;font-weight:700;padding:8px 14px;
  background:var(--teal600);color:#fff;border:none;border-radius:var(--r12);
  cursor:pointer;transition:all .15s;border-radius:var(--r12)
}
.gw-add-btn:hover{background:var(--teal800)}
.gw-stats{display:flex;gap:8px}
.gw-stat{text-align:center;background:var(--card);border-radius:var(--r8);padding:8px 12px;flex:1;border:1px solid var(--teal100)}
.gw-sv{font-size:17px;font-weight:800;color:var(--teal800)}
.gw-sl{font-size:13px;color:var(--txt2);font-weight:700;margin-top:1px}

/* 강원 세부탭 */
.gw-tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:0}
.gw-tabs::-webkit-scrollbar{display:none}
.gw-tab{
  flex-shrink:0;padding:8px 14px;font-size:14px;font-weight:700;
  color:var(--txt2);border-bottom:2.5px solid transparent;
  cursor:pointer;transition:all .15s;white-space:nowrap
}
.gw-tab.on{color:var(--teal800);border-bottom-color:var(--teal);font-weight:800}
.gw-tab:hover:not(.on){color:var(--txt)}

/* 강원 목록 */
.gw-list{padding:12px 14px}
.gw-search{
  display:flex;align-items:center;gap:8px;
  background:var(--gray50);border:1.5px solid var(--gray100);
  border-radius:var(--r12);padding:9px 12px;
  margin-bottom:12px;border-radius:var(--r12)
}
.gw-search input{flex:1;border:none;outline:none;background:transparent;font-size:15px;color:var(--txt);font-family:inherit;font-weight:500}
.gw-search input::placeholder{color:var(--txt3)}

/* 명소 카드 */
.spot{
  background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r14);
  padding:12px 14px;margin-bottom:8px;cursor:pointer;
  transition:all .18s;position:relative
}
.spot:hover{border-color:var(--teal100);box-shadow:var(--shadow)}
.spot-body{flex:1;min-width:0}
.spot-name{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:2px;line-height:1.4}
.spot-region{font-size:13px;color:var(--txt2);margin-bottom:4px;font-weight:600}
.spot-tags{display:flex;gap:3px;flex-wrap:wrap}
.sp-tag{font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block}
.sa-edit:hover{background:var(--amber100)}

/* 빈 상태 */
.empty-state{text-align:center;padding:40px 20px;color:var(--txt3)}
.empty-ico{font-size:40px;margin-bottom:10px}
.empty-msg{font-size:16px;font-weight:700;margin-bottom:4px;color:var(--txt)}
.empty-sub{font-size:14px;color:var(--txt2)}

/* ══ 모달 (명소 추가/편집) ══ */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(26,37,51,.45);z-index:999;
  align-items:center;justify-content:center;padding:20px
}
.modal-overlay.open{display:flex;animation:fadeOverlay .2s ease}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--card);border-radius:var(--r20);
  width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
  animation:slideUp .22s ease
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{
  padding:10px 16px 8px;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--card);border-radius:var(--r20) var(--r20) 0 0;z-index:1
}
.modal-close{
  width:32px;height:32px;border-radius:50%;border:none;
  background:var(--gray50);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s
}
.modal-close:hover{background:var(--gray100)}
.modal-body{padding:16px 20px 20px}

/* 폼 */

.form-inp,.form-select{
  width:100%;padding:10px 13px;
  border:1.5px solid var(--border);border-radius:var(--r8);
  font-size:17px;font-family:inherit;color:var(--txt);
  background:var(--bg);transition:border-color .15s;min-height:44px
}
.form-inp:focus{border-color:var(--teal);background:var(--card);box-shadow:0 0 0 3px rgba(29,158,117,.1)}
.form-inp::placeholder{color:var(--txt3)}
.form-select:focus{border-color:var(--teal);background-color:#fff}

/* 알림 토스트 */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--teal800);color:#fff;font-size:14px;font-weight:700;
  padding:11px 22px;border-radius:20px;z-index:9999;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.2)
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 내 일정 탭 강조 */
.trip-tab{color:var(--sky600) !important}

/* 홈 다가오는 여행 */
.upcoming-wrap{margin-bottom:4px}
.upcoming-card{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--r16);
  padding:14px 16px;margin-bottom:10px;cursor:pointer;
  transition:all .18s;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:14px
}
.upcoming-card:hover{border-color:var(--sky100);box-shadow:var(--shadow-hover);transform:translateY(-2px)}
.uc-body{flex:1;min-width:0}
.uc-title{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uc-meta{font-size:14px;color:var(--txt2);margin-bottom:5px;font-weight:600}
.uc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.uc-tag{font-size:13px;font-weight:700;padding:3px 10px;border-radius:20px}
.uc-arrow{font-size:20px;color:var(--txt2);flex-shrink:0}
.upcoming-empty{
  background:var(--card);border:1.5px dashed var(--border);border-radius:var(--r16);
  padding:24px;text-align:center;margin-bottom:16px
}

/* 필터 */
.trip-filter{flex:1;min-width:0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.trip-filter::-webkit-scrollbar{display:none}
.tf{flex-shrink:0;font-size:14px;font-weight:700;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--txt2);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.tf.on,.tf:hover{background:var(--sky50);border-color:var(--sky);color:var(--sky800)}
.tf-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:20px;font-size:12px;font-weight:800;background:var(--sky100);color:var(--sky800);line-height:1}
.tf.on .tf-badge{background:var(--sky);color:#fff}

/* 여행 카드 */
.trip-card{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--r16);
  margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);
  transition:all .18s;cursor:pointer
}
.trip-card:hover{border-color:var(--sky100);box-shadow:var(--shadow-hover)}
.tc-head{padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.tc-info{flex:1;min-width:0}
.tc-title{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:3px}
.tc-date{font-size:14px;color:var(--txt2);margin-bottom:6px;font-weight:600}

// 인라인 SVG 생성 헬퍼
function icon(name, size=16, cls='') {
  const svg = IC[name];
  if (!svg) return '';
  return svg.replace('<svg ', `<svg width="${size}" height="${size}" `+(cls?`class="${cls}" `:''));
}

/* ── 탭 전환 (id 직접 참조) ── */
const PANEL_IDS = ['p0','p5','p-theme','p1','p2']; // 홈·일정·테마·국내·해외
function sw(n, el) {
  document.querySelectorAll('.mtab').forEach((t,i) => t.classList.toggle('on', i===n));
  PANEL_IDS.forEach((id,i) => {
    const p = document.getElementById(id);
    if (p) p.style.display = (i===n) ? 'block' : 'none';
  });
  // p5-detail 숨기고 p5 복원
  const det = document.getElementById('p5-detail');
  if (det) det.style.display = 'none';
  const p5el = document.getElementById('p5');
  if (p5el && n === 1) p5el.style.display = 'block';
  // 테마 탭 진입 시 카운트 갱신
  if (n === 2) { initThemeCounts(); initInlineTheme(); }
  // 국내 탭 진입 시 지역 그리드 렌더링
  if (n === 3) initDomesticDests();
}
function swSub(n, el) {
  document.querySelectorAll('.stab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.sub-panel').forEach((p,i) => p.classList.toggle('on', i===n));
  if(el) el.classList.add('on');
  else {
    const tab = document.querySelectorAll('.stab')[n];
    if(tab) tab.classList.add('on');
  }
}

/* ── 강원도 세부탭 (레거시 — renderRegionPanel 내부에서 동적 생성) ── */
document.querySelectorAll('.gw-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.gw-tab').forEach(t => t.classList.remove('on'));
    tab.classList.add('on');
    currentArea = tab.dataset.area;
  });
});

/* ── 국가 필터 ── */
document.querySelectorAll('.country-row').forEach(row => {
  row.querySelectorAll('.c-chip').forEach(c => {
    c.addEventListener('click', () => {
      row.querySelectorAll('.c-chip').forEach(x => x.classList.remove('on'));
      c.classList.add('on');
    });
  });
});

// localStorage에서 불러오기 (없으면 기본 데이터 사용)
function loadFromStorage() {
  try {
    const savedTrips   = localStorage.getItem(STORAGE_KEY_TRIPS);
    const savedIds     = localStorage.getItem(STORAGE_KEY_IDS);
    return {
      trips:   savedTrips   ? JSON.parse(savedTrips)   : DEFAULT_TRIPS,
      ids:     savedIds     ? JSON.parse(savedIds)     : { nextTripId: 3, nextPlaceId: 31, nextSpotId: 6, recentCount: 0 }
    };
  } catch(e) {
    return { trips: DEFAULT_TRIPS, ids: { nextTripId: 3, nextPlaceId: 31 } };
  }
}

// localStorage에 저장
function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY_TRIPS,  JSON.stringify(trips));
    localStorage.setItem(STORAGE_KEY_IDS,    JSON.stringify({ nextTripId, nextPlaceId }));
  } catch(e) {
    //
  }
}

/* ── 날짜 유틸 ── */
function getDday(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.ceil((d - today) / 86400000);
}
function formatDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateKo(s) {
  if (!s) return '';
  const d = new Date(s);
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function getTripStatus(trip) {
  const today = new Date(); today.setHours(0,0,0,0);
  const s = new Date(trip.startDate); s.setHours(0,0,0,0);
  const e = new Date(trip.endDate); e.setHours(0,0,0,0);
  if (today < s) return 'upcoming';
  if (today > e) return 'done';
  return 'ongoing';
}
function getTripNights(trip) {
  const s = new Date(trip.startDate), e = new Date(trip.endDate);
  const n = Math.round((e-s)/86400000);
  return n > 0 ? `${n}박${n+1}일` : '당일치기';
}

/* ── 홈 upcoming 렌더 ── */
function renderUpcoming() {
  const upcoming = trips
    .filter(t => getTripStatus(t) !== 'done')
    .sort((a,b) => new Date(a.startDate) - new Date(b.startDate))
    .slice(0, 3);
  const el = document.getElementById('upcomingCards');
  const empty = document.getElementById('upcomingEmpty');
  if (!el || !empty) return;
  if (!upcoming.length) {
    el.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  el.innerHTML = upcoming.map(t => {
    const st = getTripStatus(t);
    const tagsHtml = (t.tags||[]).map(tag =>
      `<span class="uc-tag tc-tag">${tag}</span>`).join('');
    return `<div class="upcoming-card" data-trip-color="${t.color}" onclick="sw(1,document.querySelectorAll('.mtab')[1]);setTimeout(()=>openTripDetail(${t.id}),100)">
      <div class="uc-body">
        <div class="uc-title">${t.emoji} ${t.title}</div>

        <div class="uc-tags">${tagsHtml}</div>
      </div>
      <div class="uc-arrow">›</div>

  }).join('');
}

/* ── D-day 카운터 배너 ── */
function renderDday() {
  const banner  = document.getElementById('ddayBanner');
  const empty   = document.getElementById('ddayEmpty');
  if (!banner || !empty) return;

  const next = trips
    .filter(t => getTripStatus(t) !== 'done')
    .sort((a,b) => new Date(a.startDate) - new Date(b.startDate))[0];

  if (!next) {
    banner.style.display = 'none';
    empty.style.display  = 'block';
    return;
  }
  empty.style.display  = 'none';
  banner.style.display = 'block';

  const st    = getTripStatus(next);
  const dd    = getDday(next.startDate);
  const numEl   = document.getElementById('ddayNumber');
  const nameEl  = document.getElementById('ddayTripName');
  const dateEl  = document.getElementById('ddayTripDate');
  const badge   = document.getElementById('ddayBadge');
  const inner   = document.getElementById('ddayInner');

  if (st === 'ongoing') {
    if (badge) badge.style.background = 'var(--teal)';
    if (inner) { inner.style.background = 'var(--teal50)'; inner.style.borderColor = 'var(--teal100)'; }
    numEl.textContent  = 'D-0';
  } else {
    if (badge) badge.style.background = 'var(--sky)';
    if (inner) { inner.style.background = 'var(--sky50)'; inner.style.borderColor = 'var(--sky100)'; }
    numEl.textContent  = `D-${dd}`;
  }
  nameEl.textContent = `${next.emoji} ${next.title}`;
  dateEl.textContent = `${formatDate(next.startDate)} ~ ${formatDate(next.endDate)}`;
}

        allSpots.push({ ...s, regionName: r.name, regionKey: r.key });
      });
    });
  }
  if (!allSpots.length) return;

  // 중복 없이 3개 랜덤 선택
  const shuffled = [...allSpots].sort(() => Math.random() - 0.5);
  const picks = shuffled.slice(0, 3);

  const body = document.getElementById('randomSpotBody');
  const btn  = document.getElementById('randomBtn');
  if (!body) return;

  if (btn) { btn.style.opacity = '.5'; setTimeout(()=>{ btn.style.opacity='1'; }, 300); }

  body.style.opacity = '0';
  setTimeout(() => {
    body.innerHTML = picks.map((s, i) => `
      <div style="${i>0?'margin-top:14px;padding-top:14px;border-top:1px solid var(--border2)':''}">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px">
          <div style="display:flex;align-items:center;gap:7px;min-width:0">
            <span style="font-size:20px;line-height:1;flex-shrink:0">${s.emoji}</span>
            <span style="font-size:16px;font-weight:800;color:var(--txt);letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span>
          </div>
          <button onclick="window.open('https://map.naver.com/search?query=${encodeURIComponent(s.mapQ||s.name)}','_blank')"
            style="flex-shrink:0;padding:5px 11px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r8);font-size:12px;font-weight:700;color:var(--sky800);cursor:pointer;display:inline-flex;align-items:center;gap:4px;white-space:nowrap">
            <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            지도
          </button>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:5px;padding-left:2px">${s.meta || ''}</div>
        ${s.tip ? `<div style="font-size:13px;font-weight:600;color:var(--teal800);margin-bottom:6px;line-height:1.5">💡 ${s.tip}</div>` : ''}
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <span style="font-size:12px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--teal50);color:var(--teal600);border:1px solid var(--teal100)">${s.regionName}</span>
          ${(s.tags||[]).slice(0,3).map(t=>`<span style="font-size:12px;font-weight:600;padding:3px 8px;border-radius:10px;background:var(--sky50);color:var(--sky600);border:1px solid var(--sky100)">${t}</span>`).join('')}
        </div>
      </div>`).join('');
    body.style.opacity = '1';
    body.style.transition = 'opacity .2s';
  }, 150);
}

/* ── 여행 필터 ── */
function updateTripBadges() {
  const counts = { all: 0, upcoming: 0, ongoing: 0, done: 0 };
  trips.forEach(t => {
    const st = getTripStatus(t);
    counts.all++;
    if (st === 'upcoming') counts.upcoming++;
    else if (st === 'ongoing') counts.ongoing++;
    else if (st === 'done') counts.done++;
  });
  Object.entries(counts).forEach(([key, cnt]) => {
    const el = document.getElementById(`badge-${key}`);
    if (el) el.textContent = cnt;
  });
}

function filterTrips(f, el) {
  currentTripFilter = f;
  document.querySelectorAll('.tf').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderTrips();
}

function openTripDetail(id) {
  viewingTripId = id;
  renderTripDetail();
  document.getElementById('p5').style.display = 'none';
  document.getElementById('p5-detail').style.display = 'block';
}
function closeTripDetail() {
  viewingTripId = null;
  document.getElementById('p5-detail').style.display = 'none';
  document.getElementById('p5').style.display = 'block';
}
function renderTripDetail() {
  const t = trips.find(x => x.id === viewingTripId);
  if (!t) return;
  /* ── 날짜별 일정 (단순 타임라인) ── */
  const daysHtml = t.days.map((day, di) => {
    // 같은 시간대 선택지([…] 패턴)를 그룹핑
    const groups = [];
    day.places.forEach(p => {
      const isChoice = /^\[.+[①②③④⑤]/.test(p.name);
      if (isChoice && groups.length && groups[groups.length-1].isChoice && groups[groups.length-1].time === p.time) {
        groups[groups.length-1].items.push(p);
      } else {
        groups.push({ isChoice, time: p.time, items: [p] });
      }
    });

    const typeMap = {lodging:'숙소',restaurant:'식당',sight:'관광지',move:'이동',cafe:'카페'};
    const typeCls = {lodging:'pt-lodging',restaurant:'pt-restaurant',sight:'pt-sight',move:'pt-move',cafe:'pt-cafe'};

    const renderSingle = (p, di) => {
      const typeBadge = p.placeType ? `<span class="place-type-badge ${typeCls[p.placeType]||''}">${typeMap[p.placeType]||''}</span>` : '';
      const starsHtml = p.rating ? ` <span class="place-stars">★ ${p.rating}</span>` : '';
      const cleanNote = (p.note||'').replace(/^✅\s*/,'').replace(/^⭐\s*추천\s*[·]?\s*/,'').trim();
      const photoHtml = p.photo ? `<img src="${p.photo}" class="place-photo" alt="장소 사진" onclick="event.stopPropagation()">` : '';
      return `<div class="place-row" data-day="${di}" data-pid="${p.id}"
        ontouchend="clearTimeout(this._pt)" ontouchmove="clearTimeout(this._pt)">
        <div class="place-row-top">
          <div class="place-time">${p.time||''}</div>
          <div class="place-info">
            <div class="place-name">${typeBadge}${p.name}${starsHtml}</div>
            ${cleanNote ? `<div class="place-note">${cleanNote}</div>` : ''}
            ${photoHtml}
          </div>
        </div>
      </div>`;
    };

    const renderChoiceGroup = (g, di) => {
      const p0 = g.items[0];
      const typeBadge = p0.placeType ? `<span class="place-type-badge ${typeCls[p0.placeType]||''}">${typeMap[p0.placeType]||''}</span>` : '';
      const catLabel = p0.name.replace(/^\[([^①②③④⑤\]]+)[①②③④⑤]\].*/, '$1').trim();

      const cardRows = g.items.map((p, idx) => {
        const cleanNote = (p.note||'').replace(/^✅\s*/,'').replace(/^⭐\s*추천\s*[·]?\s*/,'').trim();
        const starsHtml = p.rating ? `<span class="place-stars" style="font-size:12px">★ ${p.rating}</span>` : '';
        const cleanName = p.name.replace(/^\[[^\]]+\]\s*/, '');
        const cost = p.cost ? `<span style="font-size:11px;color:var(--green800);font-weight:700">${p.cost}</span>` : '';
        const num = ['①','②','③','④','⑤'][idx] || '';
        return `<div class="place-row" style="background:var(--bg);border-left:3px solid var(--border)" data-day="${di}" data-pid="${p.id}">
          <div class="place-row-top">
            <div class="place-time" style="width:40px;flex-shrink:0"></div>
            <div class="place-info">
              <div class="place-name" style="font-size:14px">
                <span style="font-size:16px;margin-right:4px">${p.emoji||''}</span>${cleanName}${starsHtml?` ${starsHtml}`:''}${cost?` ${cost}`:''}
              </div>
              ${cleanNote ? `<div class="place-note">${cleanNote}</div>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');

      return `<div class="place-row choice-group-row" data-day="${di}">
        <div class="place-row-top" style="align-items:flex-start">
          <div class="place-time">${g.time||''}</div>
          <div class="place-info" style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
              ${typeBadge}
              <span style="font-size:13px;font-weight:700;color:var(--txt2)">${catLabel} 추천</span>
            </div>
          </div>
        </div>
      </div>${cardRows}`;
    };

    const placesHtml = day.places.length
      ? groups.map(g => g.isChoice ? renderChoiceGroup(g, di) : renderSingle(g.items[0], di)).join('')
      : `<div class="no-places">아직 추가된 장소가 없어요. 장소 추가 버튼을 눌러보세요!</div>`;

    return `<div class="day-block">
      <div class="day-head">
        <div>
          <div class="day-label">Day ${di+1}</div>
          <div class="day-date">${formatDateKo(day.date)}</div>
        </div>
        
      </div>
      ${placesHtml}
    </div>`;
  }).join('');

  /* ── 하단 장소 정보 섹션 ── */
  const allPlaces = t.days.flatMap(d => d.places);

  // 숙소: shopName 기준 중복 제거 → 체크인(hours에 '체크인' 포함)만 남기고, 없으면 첫 번째
  const lodgingRaw = allPlaces.filter(p => p.placeType === 'lodging' && p.name);
  const lodgingMap = new Map();
  lodgingRaw.forEach(p => {
    const key = (p.shopName || p.name).trim();
    if (!lodgingMap.has(key)) {
      lodgingMap.set(key, p);
    } else {
      // 이미 있으면 체크인 항목 우선
      const existing = lodgingMap.get(key);
      const isCheckin = (p.hours||'').includes('체크인') || (p.name||'').includes('체크인');
      if (isCheckin) lodgingMap.set(key, p);

  const lodgings = [...lodgingMap.values()];

  const restaurants = allPlaces.filter(p => p.placeType === 'restaurant' && p.name);
  const sights      = allPlaces.filter(p => p.placeType === 'sight'      && p.name);

    const shopName = p.shopName || p.name
      .replace(/\s*(체크인|체크아웃|방문|이동|입구|출발|도착).*$/,'').trim();
    const qName    = encodeURIComponent(shopName);
    const qFull    = encodeURIComponent(shopName + (p.address ? ' ' + p.address : ''));
    const naverMap  = `https://map.naver.com/v5/search/${qName}`;
    const naverBook = `https://search.naver.com/search.naver?query=${qName}`;
    const naverSrch = `https://search.naver.com/search.naver?query=${qName}`;
    const starsHtml = p.rating ? `<span class="info-star">★ ${p.rating}</span>` : '';
    const costHtml  = p.cost   ? `<span class="info-chip"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M20 12V8a2 2 0 00-2-2H4a2 2 0 00-2 2v12a2 2 0 002 2h14a2 2 0 002-2v-4"/><path d="M16 12h6v4h-6a2 2 0 010-4z"/></svg> ${p.cost}</span>` : '';
    const hoursHtml = p.hours  ? `<span class="info-chip"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${p.hours}</span>` : '';

    const phoneBtn  = p.phone  ? `<a class="info-btn info-call" href="tel:${p.phone}"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg> ${p.phone}</a>` : '';

        <a class="info-btn info-book" href="${naverBook}" target="_blank">🏨 네이버 예약</a>
        <a class="info-btn info-map"  href="${naverMap}"  target="_blank">🗺️ 지도</a>
        ${phoneBtn}`;
    } else {
      actionBtns = `
        <a class="info-btn info-map"   href="${naverMap}"  target="_blank">🗺️ 지도</a>
        <a class="info-btn info-naver" href="${naverSrch}" target="_blank"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> 검색</a>
        ${phoneBtn}`;
    }
    // 카드 이름은 shopName으로 표시
    return `<div class="info-card">
      <div class="info-card-head">
        <div class="info-emoji">${p.emoji && p.emoji!=='📍' ? p.emoji : placeIconSvg(p.placeType,'',22)}</div>
        <div class="info-body">
          <div class="info-name">${shopName} ${starsHtml}</div>
          ${addrHtml}
          <div class="info-chips">${costHtml}${hoursHtml}</div>
        </div>
      </div>
      <div class="info-btns">${actionBtns}</div>
    </div>`;
  }

  const lodgingSec = lodgings.length ? `
    <div class="info-section">
      <div class="info-sec-title"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4v16M2 8h18a2 2 0 012 2v6H2"/><path d="M6 8v-4M18 14v-2a4 4 0 00-4-4h-4"/></svg> 숙소</div>
      ${lodgings.map(p => infoCard(p,'lodging')).join('')}

  const restaurantSec = restaurants.length ? `
    <div class="info-section">

      ${restaurants.map(p => infoCard(p,'restaurant')).join('')}
    </div>` : '';
  const sightSec = sights.length ? `
    <div class="info-section">
      <div class="info-sec-title"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> 관광지</div>
      ${sights.map(p => infoCard(p,'sight')).join('')}

  const hasInfo = lodgings.length || restaurants.length || sights.length;
  const infoHtml = hasInfo ? `
    <div class="sec" style="margin-top:20px"><div class="sec-t">장소 정보</div></div>
    ${lodgingSec}${restaurantSec}${sightSec}` : '';

  const detailEl = document.getElementById('detailContent');
  detailEl.setAttribute('data-trip-color', t.color || 'sky');
  const totalPlaces = t.days.reduce((s,d) => s + d.places.length, 0);
  const tagsHtml = (t.tags||[]).map(tag => `<span class="tc-tag" style="font-size:12px;padding:2px 8px">${tag}</span>`).join('');
  detailEl.innerHTML = `
    <div class="detail-hero tc-hero" data-trip-color="${t.color}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="font-size:30px;flex-shrink:0;width:48px;height:48px;border-radius:var(--r12);background:rgba(255,255,255,.6);border:1px solid var(--tc-border);display:flex;align-items:center;justify-content:center">${t.emoji}</div>
        <div style="flex:1;min-width:0">
          <div class="detail-title tc-title-txt" style="margin-bottom:2px">${t.title}</div>
          <div class="detail-date tc-date-txt" style="margin-bottom:0"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${formatDate(t.startDate)} ~ ${formatDate(t.endDate)} · ${getTripNights(t)}</div>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:${(t.companions||t.memo)?'8px':'0'}">
        ${tagsHtml}
        <span style="font-size:12px;color:var(--tc-txt2);font-weight:600">📍 ${totalPlaces}개 장소</span>
        ${t.companions ? `<span style="font-size:12px;color:var(--tc-txt2);font-weight:600">👥 ${t.companions}</span>` : ''}
      </div>
      ${t.memo ? `<div class="detail-memo tc-memo-txt" style="font-size:13px;border-top:1px solid var(--tc-border);padding-top:8px">📝 ${t.memo}</div>` : ''}
    </div>
    <div class="sec" style="margin-top:14px"><div class="sec-t">날짜별 일정</div></div>
    ${daysHtml}
    ${infoHtml}`;
}

function starHtml(r) {
  if (!r) return '';
  const full = Math.floor(r);
  return `<span style="font-size:13px">${'⭐'.repeat(full)} <b style="color:#1A2535;font-weight:800">${r.toFixed(1)}</b></span>`;
}

/* ── 공통 태그 색상 함수 ── */
function tagColor(t) {
  const v = t.toLowerCase();
  if (/사원|신사|절|성|궁|유적|역사|문화재|세계유산/.test(v)) return {bg:'#EDE9FE',c:'#5B21B6'};
  if (/자연|공원|숲|산|강|호수|해변|폭포|계곡|바다|섬/.test(v)) return {bg:'#D1FAE5',c:'#065F46'};
  if (/맛집|음식|시장|해산물|먹거리|미식|카페|빵/.test(v)) return {bg:'#FEF3C7',c:'#92400E'};
  if (/쇼핑|번화가|교차로|상점|마트|백화점/.test(v)) return {bg:'#FCE7F3',c:'#9D174D'};
  if (/전망|야경|타워|스카이/.test(v)) return {bg:'#DBEAFE',c:'#1E40AF'};
  if (/무료|입장무료/.test(v)) return {bg:'#D1FAE5',c:'#065F46'};
  return {bg:'#F1F5F9',c:'#475569'};
}

function getThemeSpots(themeKey) {
  const meta = THEME_META[themeKey];
  const result = [];
  REGIONS.forEach(region => {
    const spots = getRegionSpots(region.key);
    spots.forEach(spot => {
      let match;
      if (themeKey === 'all') {
        match = true;
      } else if (['restaurant','season','valley','beach'].includes(themeKey)) {
        // tags 배열 정확 매칭만 사용 (tip·name 텍스트 검색 제외)
        match = meta.keys.some(k => (spot.tags||[]).some(t => t.toLowerCase() === k.toLowerCase()));
      } else {
        const allText = [...(spot.tags||[]), spot.name, spot.meta||'', spot.tip||''].join(' ').toLowerCase();
        match = meta.keys.some(k => allText.includes(k.toLowerCase()));
      }
      if (match) result.push({ ...spot, regionName: region.name, regionKey: region.key });
    });
  });
  return result.sort((a,b) => (b.rating||0) - (a.rating||0));
}

  // 아코디언: 처음 열릴 때만 애니메이션, 이미 열려 있으면 유지

function highlightRegionCard(key) {
  document.querySelectorAll('.ritem').forEach(el => el.classList.remove('on'));

  if (idx >= 0) document.querySelectorAll('.ritem')[idx]?.classList.add('on');
}

function updateRegionCounts() {
  REGIONS.forEach(r => {
    const stored = getRegionSpots(r.key);
    const el = document.getElementById(`rcnt-${r.key}`);
    if (el) el.textContent = stored.length + '곳';
  });
}

/* ── 지역 spots 버전 (데이터 변경 시 숫자 올리면 캐시 초기화) ── */
const REGION_DATA_VERSION = 'v4';
const REGION_VER_KEY = 'travelon_region_ver';

// 버전 불일치 시 region 캐시 전체 초기화
(function clearStaleRegionCache() {
  if (localStorage.getItem(REGION_VER_KEY) !== REGION_DATA_VERSION) {
    Object.keys(localStorage).filter(k => k.startsWith('travelon_region_') && k !== REGION_VER_KEY)
      .forEach(k => localStorage.removeItem(k));
    localStorage.setItem(REGION_VER_KEY, REGION_DATA_VERSION);
  }
})();

function regionStorageKey(key) { return `travelon_region_${key}`; }

function getRegionSpots(key) {
  const region = REGIONS.find(r => r.key === key);
  if (!region) return [];
  try {
    const saved = localStorage.getItem(regionStorageKey(key));
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(region.spots));
  } catch(e) { return JSON.parse(JSON.stringify(region.spots)); }
}

function renderRegionSpotList(key) {
  const list = getRegionSpots(key);
  const query = (document.getElementById(`rsearch-${key}`)?.value || '').trim().toLowerCase();
  const filtered = query ? list.filter(s => s.name.toLowerCase().includes(query) || s.tags.some(t=>t.includes(query))) : list;
  const el = document.getElementById(`rlist-${key}`);
  if (!el) return;
  const BGCOLORS = ['#E6F1FB','#E1F5EE','#FAEEDA','#FAECE7','#EEEDFE','#EAF3DE','#FBEAF0','#F1EFE8'];
  function _localStarHtml(r) {
    if (!r) return '';
    const full = Math.floor(r), half = (r % 1) >= 0.5;
    let s = '';
    for(let i=0;i<full;i++) s+='⭐';
    if(half) s+='✨';
    return `<span style="font-size:13px">${s} <span style="font-size:13px;color:#1A2535;font-weight:800">${r.toFixed(1)}</span></span>`;
  }
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-ico">🗺️</div><div class="empty-msg">명소가 없습니다</div><div class="empty-sub">위의 + 명소 추가 버튼으로 추가해 보세요!</div></div>`;
  } else {
    el.innerHTML = filtered.map((s,i) => {
      const safeS = JSON.stringify({emoji:s.emoji,name:s.name,meta:s.meta||'',tags:s.tags}).replace(/"/g,'&quot;');
      const tagsHtml = (s.tags||[]).map(t=>{ const {bg,c}=tagColor(t); return `<span class="sp-tag" style="background:${bg};color:${c}">${t}</span>`; }).join('');
      return `<div class="spot">
        <div class="spot-body">
          <div class="spot-name" style="margin-bottom:2px">${s.emoji} ${s.name}${_localStarHtml(s.rating) ? ' '+_localStarHtml(s.rating) : ''}</div>
          <div class="spot-region" style="margin-bottom:4px">${s.meta||''}</div>
          <div class="spot-tags">${tagsHtml}</div>
          ${s.tip ? `<div style="font-size:13px;font-weight:600;color:var(--teal800);margin-bottom:6px;line-height:1.5">💡 ${s.tip}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }
  const total = list.length;
  const free = list.filter(s=>(s.meta||'').includes('무료')).length;
  const tc = document.getElementById(`rcnt2-${key}`);
  const fc = document.getElementById(`rfreecnt-${key}`);
  if (tc) tc.textContent = total;
  if (fc) fc.textContent = free;
  const rc = document.getElementById(`rcnt-${key}`);
  if (rc) rc.textContent = total + '곳';
}

  selectIntlRegion('japan');
}

/* 지역 탭 렌더링 */
function renderIntlRegionTabs() {
  const el = document.getElementById('intlRegionTabs');
  if (!el) return;
  el.innerHTML = INTL_REGIONS.map(r =>
    `<div class="theme-ftab" id="intlRTab_${r.key}" onclick="selectIntlRegion('${r.key}')">${r.name}</div>`
  ).join('');
}

/* 지역 탭 선택 */
function selectIntlRegion(regionKey) {
  // 나라 여러개 지역 재클릭 → 나라 탭으로 복귀
  const countryLayerVisible = document.getElementById('intlCountryLayer').style.display !== 'none';
  const countryCityVisible  = document.getElementById('intlCountryCityWrap').style.display !== 'none';
  if (regionKey === currentIntlRegion && countryLayerVisible && countryCityVisible) {
    currentIntlCountry = null;
    currentIntlCity = null;
    document.getElementById('intlCountryCityWrap').style.display = 'none';
    // 나라 탭 활성화 해제
    document.querySelectorAll('[id^="intlCTab_"]').forEach(t => t.classList.remove('on'));
    return;
  }

  currentIntlRegion = regionKey;
  currentIntlCountry = null;
  currentIntlCity = null;

  // 지역 탭 활성화
  document.querySelectorAll('[id^="intlRTab_"]').forEach(t => {
    t.classList.remove('on');
    t.style.color = '';
    t.style.background = '';
    t.style.boxShadow = '';
  });
  const activeTab = document.getElementById('intlRTab_' + regionKey);
  if (activeTab) {
    activeTab.classList.add('on');
    activeTab.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }

  // 해당 지역 나라 목록
  const countries = INTL_COUNTRIES.filter(c =>
    c.cities.some(cKey => {
      const dest = INTL_DESTS.find(d => d.cityKey === cKey);
      return dest && dest.region === regionKey;
    })
  );

  if (countries.length === 1) {
    // 나라 1개 → 바로 도시 카드 탭
    currentIntlCountry = countries[0].key;
    document.getElementById('intlCountryLayer').style.display = 'none';
    document.getElementById('intlCityLayer').style.display = 'block';
    renderIntlCityTabs(countries[0], 'intlCityTabs');
    selectIntlCity(countries[0].cities[0], 'intlCityHeader', 'intlSpotsList', 'intlCityTabs');
  } else {
    // 나라 여러개 → 나라 탭 표시
    document.getElementById('intlCountryLayer').style.display = 'block';
    document.getElementById('intlCityLayer').style.display = 'none';
    document.getElementById('intlCountryCityWrap').style.display = 'none';
    renderIntlCountryTabs(countries, regionKey);
  }
}

/* 나라 탭 렌더링 */
function renderIntlCountryTabs(countries, regionKey) {
  const el = document.getElementById('intlCountryTabs');
  if (!el) return;
  el.innerHTML = countries.map(c =>
    `<div class="theme-ftab" id="intlCTab_${c.key}" onclick="selectIntlCountry('${c.key}')">${c.name}</div>`
  ).join('');
  // 첫 번째 나라 자동 선택
  if (countries.length > 0) selectIntlCountry(countries[0].key);
}

/* 나라 탭 선택 → 도시 카드 탭 표시 */
function selectIntlCountry(countryKey) {
  currentIntlCountry = countryKey;
  currentIntlCity = null;

  // 나라 탭 활성화
  document.querySelectorAll('[id^="intlCTab_"]').forEach(t => t.classList.remove('on'));
  const activeTab = document.getElementById('intlCTab_' + countryKey);
  if (activeTab) {
    activeTab.classList.add('on');
    activeTab.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }

  const country = INTL_COUNTRIES.find(c => c.key === countryKey);
  if (!country) return;

  document.getElementById('intlCountryCityWrap').style.display = 'block';
  renderIntlCityTabs(country, 'intlCityTabs2');
  selectIntlCity(country.cities[0], 'intlCityHeader2', 'intlSpotsList2', 'intlCityTabs2');
}

/* 도시 카드 탭 렌더링 */
function renderIntlCityTabs(country, tabsId) {
  const el = document.getElementById(tabsId);
  if (!el) return;
  el.innerHTML = country.cities.map(cKey => {
    const dest = INTL_DESTS.find(d => d.cityKey === cKey);
    if (!dest) return '';
    const label = dest.name.includes(' · ') ? dest.name.split(' · ')[1] : dest.name;
    return `<div class="city-ftab" id="intlTab_${tabsId}_${cKey}" onclick="selectIntlCity('${cKey}','${tabsId === 'intlCityTabs2' ? 'intlCityHeader2' : 'intlCityHeader'}','${tabsId === 'intlCityTabs2' ? 'intlSpotsList2' : 'intlSpotsList'}','${tabsId}')">
      <div class="city-ftab-name">${label}</div>
    </div>`;
  }).join('');
}

/* 도시 선택 → 헤더 + 명소 */
function selectIntlCity(cityKey, headerId, spotsId, tabsId) {
  headerId = headerId || 'intlCityHeader';
  spotsId  = spotsId  || 'intlSpotsList';
  tabsId   = tabsId   || 'intlCityTabs';
  currentIntlCity = cityKey;

  // 해당 탭 그룹 활성화
  document.querySelectorAll(`[id^="intlTab_${tabsId}_"]`).forEach(t => t.classList.remove('on'));
  const activeTab = document.getElementById(`intlTab_${tabsId}_${cityKey}`);
  if (activeTab) {
    activeTab.classList.add('on');
    activeTab.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }

  const city = INTL_DESTS.find(d => d.cityKey === cityKey);
  if (!city) return;
  renderIntlCityHeader(city, headerId);
  renderIntlSpotsList(city, spotsId);
}

/* 도시 헤더 */
function renderIntlCityHeader(city, elId) {
  const el = document.getElementById(elId || 'intlCityHeader');
  if (!el) return;
  el.innerHTML = `<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r14);margin-top:4px;margin-bottom:14px;box-shadow:0 4px 16px rgba(55,138,221,.10)">
    <div style="background:linear-gradient(135deg,var(--sky50),var(--teal50));padding:14px 16px;border-bottom:1.5px solid var(--border);border-radius:var(--r14) var(--r14) 0 0">
      <div style="font-size:16px;font-weight:800;color:var(--sky800);margin-bottom:4px">${city.flag} ${city.name}</div>
      <div style="font-size:13px;color:var(--txt2);font-weight:600;margin-bottom:6px">${city.cities}</div>
      <div style="font-size:13px;color:var(--txt);margin-bottom:6px">${city.desc}</div>
      <div style="font-size:12px;color:var(--txt2);font-weight:600;line-height:1.5">💡 ${city.tips}</div>
    </div>
    <div style="padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;background:var(--card);border-radius:0 0 var(--r14) var(--r14)">
      ${city.links.map(l => `<button onclick="window.open('${l.url}','_blank')" style="font-size:12px;font-weight:700;padding:5px 10px;border-radius:20px;background:var(--sky50);border:1.5px solid var(--sky100);color:var(--sky800);cursor:pointer">${l.lbl}</button>`).join('')}
    </div>
  </div>`;
}

/* 명소 리스트 */
function renderIntlSpotsList(city, elId) {
  const el = document.getElementById(elId || 'intlSpotsList');
  if (!el) return;

  const CAT_THEME = {
    sight:  {bg:'var(--purple50)', border:'var(--purple100)', txt:'var(--purple800)', hdr:'var(--purple800)', icon:'⛩️'},
    food:   {bg:'var(--amber50)',  border:'var(--amber100)',  txt:'var(--amber800)',  hdr:'var(--amber800)',  icon:'🍽️'},
    cafe:   {bg:'var(--pink50)',   border:'var(--pink100)',   txt:'var(--pink800)',   hdr:'var(--pink800)',   icon:'☕'},
    shop:   {bg:'var(--sky50)',    border:'var(--sky100)',    txt:'var(--sky800)',    hdr:'var(--sky800)',    icon:'🛍️'},
    night:  {bg:'var(--purple50)',border:'var(--purple100)', txt:'var(--purple800)', hdr:'var(--purple800)', icon:'🌙'},
    nature: {bg:'var(--green50)', border:'var(--green100)',  txt:'var(--green800)',  hdr:'var(--green800)',  icon:'🌿'},
    culture:{bg:'var(--amber50)', border:'var(--amber100)',  txt:'var(--amber800)',  hdr:'var(--amber800)',  icon:'🎭'},
  };

  const ordered = [...(city.cats||[])].sort((a,b) => {
    const order = {sight:0, food:1, cafe:2, shop:3, night:4, nature:5, culture:6};
    return (order[a.key]??99) - (order[b.key]??99);
  });

  let html = '';
  ordered.forEach((cat, ci) => {
    const th = CAT_THEME[cat.key] || {bg:'var(--sky50)', border:'var(--sky100)', txt:'var(--sky800)', hdr:'var(--sky800)', icon:'📍'};
    const isOpen = ci === 0;
    const catId = `icat_${elId||'a'}_${ci}`;

    const itemsHtml = cat.items.map(item => {
      if (typeof item === 'object') {
        const mapBtn = item.map
          ? `<button onclick="window.open('${item.map}','_blank')" style="display:inline-flex;align-items:center;gap:2px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--sky50);border:1.5px solid var(--sky100);color:var(--sky800);cursor:pointer;font-family:inherit;flex-shrink:0">🗺️ 지도</button>`
          : '';
        const priceBadge = item.price
          ? `<span style="font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;background:${th.bg};border:1.5px solid ${th.border};color:${th.txt};flex-shrink:0">${item.price}</span>`
          : '';
        const tipLine = item.tip
          ? `<div style="font-size:13px;font-weight:600;color:var(--teal800);margin-bottom:6px;line-height:1.5;margin-top:4px;word-break:keep-all">💡 ${item.tip}</div>`
          : '';
        return `<div class="spot" style="cursor:default;margin-bottom:6px;padding:9px 12px">
          <div class="spot-body">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px">
              <div class="spot-name" style="margin-bottom:0;flex:1;min-width:0;font-size:15px;font-weight:700;color:var(--txt);word-break:keep-all;line-height:1.4">${item.name}</div>
              ${priceBadge}
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <div class="spot-region" style="margin-bottom:0;font-size:13px;font-weight:600;color:var(--txt2)">📍 ${item.loc}</div>
              ${mapBtn}
            </div>
            ${tipLine}
          </div>
        </div>`;
      }
      const priceMatch = item.match(/\(([^)]+엔[^)]*|무료[^)]*)\)/);
      const priceStr = priceMatch ? priceMatch[1] : '';
      const cleanName = item.replace(/\([^)]+\)/g,'').trim();
      const priceBadgeLegacy = priceStr
        ? `<span style="font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;background:${th.bg};border:1.5px solid ${th.border};color:${th.txt};flex-shrink:0">${priceStr}</span>`
        : '';
      return `<div class="spot" style="cursor:default;margin-bottom:6px;padding:9px 12px">
        <div class="spot-body">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
            <div class="spot-name" style="margin-bottom:0;font-size:15px;font-weight:700;color:var(--txt);word-break:keep-all;line-height:1.4">${cleanName}</div>
            ${priceBadgeLegacy}
          </div>
        </div>
      </div>`;
    }).join('');

    html += `
    <div style="margin-bottom:10px;border:1.5px solid ${th.border};border-radius:var(--r14);overflow:hidden;box-shadow:var(--shadow)">
      <button onclick="(function(btn){const body=document.getElementById('${catId}');const arr=btn.querySelector('.acc-arr');const open=body.style.display==='none';body.style.display=open?'block':'none';arr.style.transform=open?'rotate(0deg)':'rotate(-90deg)'})(this)"
        style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:${th.bg};border:none;cursor:pointer;font-family:inherit">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:15px;font-weight:700;color:${th.hdr}">${cat.label}</span>
          <span style="font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--card);border:1.5px solid ${th.border};color:${th.hdr}">${cat.items.length}곳</span>
        </div>
        <span class="acc-arr" style="font-size:16px;color:${th.hdr};transition:transform .2s;transform:${isOpen?'rotate(0deg)':'rotate(-90deg)'}">▾</span>
      </button>
      <div id="${catId}" style="display:${isOpen?'block':'none'};padding:8px;background:var(--bg)">
        ${itemsHtml}
      </div>
    </div>`;
  });

  el.innerHTML = html || `<div class="empty-state"><div class="empty-ico">🗺️</div><div class="empty-msg">명소 정보가 없습니다</div></div>`;
}

function deleteTrip(id) {
  if (!confirm('이 여행을 삭제할까요?')) return;
  trips = trips.filter(t => t.id !== id);
  saveToStorage();
  renderTrips();
  renderUpcoming();
  renderDday();
  showToast('🗑️ 여행이 삭제됐어요');
}

  { ico:'🌐', bg:'var(--coral50)',  text:'파파고·구글 번역 앱을 미리 설치하고 오프라인 언어팩도 다운받아 두세요.' },
  { ico:'💳', bg:'var(--pink50)',   text:'해외에서는 현금을 여러 곳에 나눠 보관하고 비상용 카드도 따로 챙기세요.' },
  { ico:'🌤️', bg:'var(--sky50)',   text:'여행 전날 현지 날씨를 다시 한번 확인하고 옷차림을 조정하는 게 기본이에요.' },
  { ico:'🔑', bg:'var(--green50)',  text:'숙소 체크인 시간보다 일찍 도착하면 짐 보관 서비스를 요청해 보세요.' },
];
let tipIdx = Math.floor(Math.random() * TODAY_TIPS.length);
function renderTodayTip() {
  const t = TODAY_TIPS[tipIdx];
  const card = document.getElementById('todayTipCard');
  const ico  = document.getElementById('todayTipIco');
  const txt  = document.getElementById('todayTipText');
  if (!card) return;
  ico.textContent = t.ico;
  ico.style.background = t.bg;
  txt.textContent = t.text;
  // 탭할 때만 애니메이션
  card.style.opacity = '1';
  card.style.transform = 'translateY(0)';
}
function rotateTip() {
  const card = document.getElementById('todayTipCard');
  if (card) { card.style.transition = 'opacity .18s ease, transform .18s ease'; card.style.opacity = '0'; card.style.transform = 'translateY(4px)'; }
  setTimeout(() => {
    tipIdx = (tipIdx + 1) % TODAY_TIPS.length;
    renderTodayTip();
    if (card) { card.style.transition = 'opacity .22s ease, transform .22s ease'; card.style.opacity = '1'; card.style.transform = 'translateY(0)'; }
  }, 180);
  showToast('💡 새 여행 팁!');
}
renderTodayTip();

/* ── 장소 타입 아이콘 ── */
function placeIconSvg(placeType, emoji, size) {
  size = size || 18;
  if (emoji && emoji !== '📍') return '<span style="font-size:' + size + 'px;line-height:1">' + emoji + '</span>';
  var icons = {
    lodging: '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
    restaurant: '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>',
    sight: '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/></svg>',
    move: '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 1118 18"/><polyline points="15 15 18 18 21 15"/></svg>',
    default: '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>'
  };
  var ico = icons[placeType] || icons.default;
  return '<span style="display:inline-flex;align-items:center;justify-content:center;width:' + size + 'px;height:' + size + 'px;flex-shrink:0">' + ico + '</span>';
}

/* ── D-day 자동 갱신 ── */
function scheduleDdayRefresh(){
  const now=new Date();
  const ms=(new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now)+1000;
  setTimeout(()=>{renderTrips();renderUpcoming();renderDday();scheduleDdayRefresh();},ms);
}
scheduleDdayRefresh();
</script>
